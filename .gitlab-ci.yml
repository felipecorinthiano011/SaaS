stages:
  - build
  - test

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

cache:
  paths:
    - .m2/repository

test:ai-service:
  stage: test
  image: python:3.11
  script:
    - cd ai-service
    - pip install -r requirements.txt
    - python -m pytest -v
  cache:
    paths:
      - ai-service/.venv/

test:frontend:
  stage: test
  image: node:20
  script:
    - cd frontend
    - npm ci
    - npm run build
  cache:
    paths:
      - frontend/node_modules/

test:backend:
  stage: test
  image: maven:3.9.8-eclipse-temurin-21
  script:
    - cd backend
    - mvn -B clean test

